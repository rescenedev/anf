<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
#terminal { width: 100%; height: 100%; }
.xterm { height: 100%; }
.xterm-viewport { overflow-y: auto !important; }
</style>
<link rel="stylesheet" href="xterm.css">
<script src="xterm.min.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
const term = new Terminal({
  allowProposedApi: true,
  fontFamily: 'Menlo, Monaco, "Courier New", monospace',
  fontSize: 13,
  lineHeight: 1.2,
  cursorBlink: true,
  cursorStyle: 'block',
  scrollback: 10000,
  theme: {
    background: '#1e1e1e',
    foreground: '#d4d4d4',
    cursor: '#d4d4d4',
    selectionBackground: 'rgba(255,255,255,0.25)',
    black: '#1e1e1e', red: '#f44747', green: '#6a9955',
    yellow: '#d7ba7d', blue: '#569cd6', magenta: '#c586c0',
    cyan: '#4ec9b0', white: '#d4d4d4',
    brightBlack: '#808080', brightRed: '#f44747', brightGreen: '#6a9955',
    brightYellow: '#d7ba7d', brightBlue: '#569cd6', brightMagenta: '#c586c0',
    brightCyan: '#4ec9b0', brightWhite: '#ffffff',
  }
});

term.open(document.getElementById('terminal'));
term.focus();

// Register a Unicode 11 wide-character provider.
// xterm.js defaults to Unicode 6, which treats many modern emoji as
// 1-column wide.  Powerlevel10k (and other prompts) renders those glyphs
// as 2-column wide, so without this the cursor misaligns and the prompt
// appears garbled.  Unicode 11 contains the correct 2-wide designations
// for all emoji in U+1F300–U+1FAFF and related blocks.
(function () {
  // Flat array of [lo, hi] pairs for all Unicode 11 wide-char ranges.
  // Each pair is stored as two consecutive elements for binary-search.
  const W = [
    0x1100,0x115f, 0x231a,0x231b, 0x2329,0x232a, 0x23e9,0x23f3,
    0x23f8,0x23fa, 0x25aa,0x25ab, 0x25b6,0x25b6, 0x25c0,0x25c0,
    0x25fb,0x25fe, 0x2600,0x2604, 0x260e,0x260e, 0x2611,0x2611,
    0x2614,0x2615, 0x2618,0x2618, 0x261d,0x261d, 0x2620,0x2620,
    0x2622,0x2623, 0x2626,0x2626, 0x262a,0x262a, 0x262e,0x262f,
    0x2638,0x263a, 0x2640,0x2640, 0x2642,0x2642, 0x2648,0x2653,
    0x265f,0x2660, 0x2663,0x2663, 0x2665,0x2666, 0x2668,0x2668,
    0x267b,0x267b, 0x267e,0x267f, 0x2692,0x2697, 0x2699,0x2699,
    0x269b,0x269c, 0x26a0,0x26a1, 0x26aa,0x26ab, 0x26b0,0x26b1,
    0x26bd,0x26be, 0x26c4,0x26c5, 0x26ce,0x26cf, 0x26d1,0x26d1,
    0x26d3,0x26d4, 0x26e9,0x26ea, 0x26f0,0x26f5, 0x26f7,0x26fa,
    0x26fd,0x26fd, 0x2702,0x2702, 0x2705,0x2705, 0x2708,0x270d,
    0x270f,0x270f, 0x2712,0x2712, 0x2714,0x2714, 0x2716,0x2716,
    0x271d,0x271d, 0x2721,0x2721, 0x2728,0x2728, 0x2733,0x2734,
    0x2744,0x2744, 0x2747,0x2747, 0x274c,0x274c, 0x274e,0x274e,
    0x2753,0x2755, 0x2757,0x2757, 0x2763,0x2764, 0x2795,0x2797,
    0x27a1,0x27a1, 0x27b0,0x27b0, 0x27bf,0x27bf, 0x2934,0x2935,
    0x2b05,0x2b07, 0x2b1b,0x2b1c, 0x2b50,0x2b50, 0x2b55,0x2b55,
    0x2e80,0x303e, 0x3041,0xa4cf, 0xa960,0xa97f, 0xac00,0xd7ff,
    0xf900,0xfaff, 0xfe10,0xfe1f, 0xfe30,0xfe4f, 0xff01,0xff60,
    0xffe0,0xffe6,
    0x16fe0,0x16fe3, 0x17000,0x18aff, 0x1b000,0x1b12f, 0x1b170,0x1b2ff,
    0x1f004,0x1f004, 0x1f0cf,0x1f0cf, 0x1f18e,0x1f18e, 0x1f191,0x1f19a,
    0x1f1e6,0x1f1ff, 0x1f201,0x1f202, 0x1f21a,0x1f21a, 0x1f22f,0x1f22f,
    0x1f232,0x1f23a, 0x1f250,0x1f251,
    0x1f300,0x1f64f, 0x1f680,0x1f6ff,
    0x1f700,0x1f77f, 0x1f780,0x1f7ff, 0x1f800,0x1f8ff,
    0x1f900,0x1f9ff, 0x1fa00,0x1fa6f, 0x1fa70,0x1faff,
    0x20000,0x2fffd, 0x30000,0x3fffd,
  ];
  term.unicode.register({
    version: '11',
    wcwidth(ucs) {
      if (ucs < 0x20 || (ucs >= 0x7f && ucs < 0xa0)) return 0;
      let lo = 0, hi = (W.length >> 1) - 1;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (ucs < W[mid * 2]) hi = mid - 1;
        else if (ucs > W[mid * 2 + 1]) lo = mid + 1;
        else return 2;
      }
      return 1;
    }
  });
  term.unicode.activeVersion = '11';
}());

// Input: user keystrokes → native PTY
term.onData(data => {
  window.webkit.messageHandlers.input.postMessage(data);
});

// Output: native PTY → terminal display
window.termWrite = function(data) { term.write(data); };

// Recompute rows/cols from the current pixel size, resize xterm's own grid
// (this is what actually reflows the display), tell the PTY, and stick to bottom.
function fit() {
  const dims = term._core && term._core._renderService && term._core._renderService.dimensions;
  if (!dims || !dims.css || !dims.css.cell || !dims.css.cell.width || !dims.css.cell.height) return;
  const el = term.element;
  if (!el || !el.offsetWidth || !el.offsetHeight) return;
  const cols = Math.max(2, Math.floor(el.offsetWidth / dims.css.cell.width));
  const rows = Math.max(1, Math.floor(el.offsetHeight / dims.css.cell.height));
  if (cols !== term.cols || rows !== term.rows) {
    term.resize(cols, rows);
    window.webkit.messageHandlers.resize.postMessage({cols, rows});
  }
  term.scrollToBottom();
}

window.termResize = function(cols, rows) { term.resize(cols, rows); };
window.termSetFontSize = function(size) {
  term.options.fontSize = size;
  requestAnimationFrame(fit);
};

// Reflow whenever the container's pixel size changes.
const ro = new ResizeObserver(() => requestAnimationFrame(fit));
ro.observe(document.getElementById('terminal'));

// Notify Swift that the page is ready
window.webkit.messageHandlers.ready.postMessage(null);
</script>
</body>
</html>
